<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WakeWord App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f8fafc;
      overflow: hidden;
      user-select: none;
    }

    .container {
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 1px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎙️</div>
    <h1>Hello World</h1>
    <p class="subtitle">Say "hello trilogy" to activate</p>
  </div>
</body>
</html>
